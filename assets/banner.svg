<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)" rx="12"/>

  <!-- Grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="40" x2="1200" y2="40" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="1200" y2="80" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="280" x2="1200" y2="280" stroke="#fff" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="1100" y1="0" x2="1100" y2="320" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="950" cy="80" r="120" fill="none" stroke="#7b2ff7" stroke-width="0.8" opacity="0.15"/>
  <circle cx="980" cy="100" r="80" fill="none" stroke="#00d2ff" stroke-width="0.6" opacity="0.12"/>
  <circle cx="200" cy="260" r="90" fill="none" stroke="#7b2ff7" stroke-width="0.6" opacity="0.1"/>

  <!-- Shield icon -->
  <g transform="translate(160, 85)" filter="url(#softglow)">
    <path d="M75 0 L150 35 L150 90 C150 130 115 160 75 175 C35 160 0 130 0 90 L0 35 Z"
          fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.9"/>
    <path d="M75 15 L138 45 L138 88 C138 122 108 148 75 162 C42 148 12 122 12 88 L12 45 Z"
          fill="#302b63" fill-opacity="0.5"/>
    <!-- Eye icon inside shield -->
    <ellipse cx="75" cy="82" rx="35" ry="22" fill="none" stroke="#00d2ff" stroke-width="2.5" opacity="0.8"/>
    <circle cx="75" cy="82" r="12" fill="#00d2ff" opacity="0.3"/>
    <circle cx="75" cy="82" r="6" fill="#00d2ff" opacity="0.8"/>
    <!-- Checkmark -->
    <path d="M58 120 L72 134 L95 108" fill="none" stroke="#4ade80" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>

  <!-- Title -->
  <text x="370" y="145" font-family="'Segoe UI', Arial, sans-serif" font-size="64" font-weight="700" fill="#ffffff" filter="url(#glow)">StudyGuard</text>

  <!-- Subtitle -->
  <text x="370" y="185" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#a0aec0" font-weight="300">AI-Powered Study Companion with Vision, Voice &amp; Robotics</text>

  <!-- Accent line -->
  <rect x="370" y="200" width="120" height="3" fill="url(#accent)" rx="1.5" opacity="0.8"/>

  <!-- Tag pills -->
  <g transform="translate(370, 225)">
    <rect x="0" y="0" width="90" height="28" rx="14" fill="#7b2ff7" fill-opacity="0.2" stroke="#7b2ff7" stroke-width="1" stroke-opacity="0.4"/>
    <text x="45" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#c4b5fd" text-anchor="middle">Computer Vision</text>

    <rect x="100" y="0" width="75" height="28" rx="14" fill="#00d2ff" fill-opacity="0.2" stroke="#00d2ff" stroke-width="1" stroke-opacity="0.4"/>
    <text x="137" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#67e8f9" text-anchor="middle">Voice AI</text>

    <rect x="185" y="0" width="68" height="28" rx="14" fill="#4ade80" fill-opacity="0.2" stroke="#4ade80" stroke-width="1" stroke-opacity="0.4"/>
    <text x="219" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#86efac" text-anchor="middle">Robotics</text>

    <rect x="263" y="0" width="90" height="28" rx="14" fill="#f472b6" fill-opacity="0.2" stroke="#f472b6" stroke-width="1" stroke-opacity="0.4"/>
    <text x="308" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#f9a8d4" text-anchor="middle">DNS Blocking</text>
  </g>
</svg>
