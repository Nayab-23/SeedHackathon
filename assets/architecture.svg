<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b2ff7"/>
      <stop offset="100%" style="stop-color:#5b21b6"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="520" fill="url(#bg2)" rx="12"/>

  <!-- Title -->
  <text x="500" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="22" fill="#e2e8f0" text-anchor="middle" font-weight="600">System Architecture</text>

  <!-- Camera Input -->
  <g filter="url(#shadow)">
    <rect x="30" y="80" width="160" height="80" rx="10" fill="#1e1b4b" stroke="#7b2ff7" stroke-width="1.5"/>
    <circle cx="70" cy="110" r="16" fill="url(#purple)" opacity="0.3"/>
    <circle cx="70" cy="110" r="10" fill="none" stroke="#7b2ff7" stroke-width="1.5"/>
    <circle cx="70" cy="110" r="4" fill="#7b2ff7"/>
    <text x="110" y="107" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#c4b5fd" text-anchor="middle">Camera</text>
    <text x="110" y="123" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b8ba7" text-anchor="middle">OpenCV</text>
  </g>

  <!-- Microphone Input -->
  <g filter="url(#shadow)">
    <rect x="30" y="190" width="160" height="80" rx="10" fill="#1e1b4b" stroke="#00d2ff" stroke-width="1.5"/>
    <rect x="62" y="215" width="16" height="24" rx="8" fill="none" stroke="#00d2ff" stroke-width="1.5"/>
    <path d="M55 232 C55 245 85 245 85 232" fill="none" stroke="#00d2ff" stroke-width="1.5"/>
    <line x1="70" y1="245" x2="70" y2="252" stroke="#00d2ff" stroke-width="1.5"/>
    <text x="120" y="225" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#67e8f9" text-anchor="middle">Microphone</text>
    <text x="120" y="241" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b8ba7" text-anchor="middle">PyAudio</text>
  </g>

  <!-- FastAPI Server (center) -->
  <g filter="url(#shadow)">
    <rect x="310" y="100" width="220" height="160" rx="12" fill="#1a1a2e" stroke="#4ade80" stroke-width="2"/>
    <rect x="310" y="100" width="220" height="35" rx="12" fill="url(#green)" opacity="0.15"/>
    <text x="420" y="123" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#4ade80" text-anchor="middle" font-weight="600">FastAPI Server</text>
    <text x="420" y="155" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a0aec0" text-anchor="middle">vision.py</text>
    <text x="420" y="173" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a0aec0" text-anchor="middle">voice_loop.py</text>
    <text x="420" y="191" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a0aec0" text-anchor="middle">argue.py</text>
    <text x="420" y="209" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a0aec0" text-anchor="middle">reachy_control.py</text>
    <text x="420" y="243" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">main.py</text>
  </g>

  <!-- OpenAI API -->
  <g filter="url(#shadow)">
    <rect x="310" y="310" width="220" height="70" rx="10" fill="#1e1b4b" stroke="#fb923c" stroke-width="1.5"/>
    <text x="420" y="342" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#fb923c" text-anchor="middle" font-weight="600">OpenAI API</text>
    <text x="420" y="362" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b8ba7" text-anchor="middle">GPT-4 Vision &amp; Chat &amp; TTS/STT</text>
  </g>

  <!-- Dashboard -->
  <g filter="url(#shadow)">
    <rect x="650" y="80" width="180" height="90" rx="10" fill="#1e1b4b" stroke="#f472b6" stroke-width="1.5"/>
    <rect x="670" y="100" width="140" height="16" rx="3" fill="#f472b6" opacity="0.15"/>
    <rect x="670" y="120" width="65" height="30" rx="3" fill="#f472b6" opacity="0.08"/>
    <rect x="745" y="120" width="65" height="30" rx="3" fill="#f472b6" opacity="0.08"/>
    <text x="740" y="109" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#f9a8d4" text-anchor="middle">StudyGuard Dashboard</text>
    <text x="740" y="168" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#f472b6" text-anchor="middle" font-weight="500">Parent Dashboard</text>
  </g>

  <!-- DNS / Website Blocking -->
  <g filter="url(#shadow)">
    <rect x="650" y="200" width="180" height="80" rx="10" fill="#1e1b4b" stroke="#ef4444" stroke-width="1.5"/>
    <text x="740" y="235" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#ef4444" text-anchor="middle" font-weight="500">DNS Blocking</text>
    <text x="740" y="255" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b8ba7" text-anchor="middle">dnsmasq</text>
  </g>

  <!-- Reachy Robot -->
  <g filter="url(#shadow)">
    <rect x="650" y="310" width="180" height="80" rx="10" fill="#1e1b4b" stroke="#00d2ff" stroke-width="1.5"/>
    <!-- Simple robot face -->
    <circle cx="720" cy="345" r="12" fill="none" stroke="#00d2ff" stroke-width="1.2"/>
    <circle cx="716" cy="342" r="2" fill="#00d2ff"/>
    <circle cx="724" cy="342" r="2" fill="#00d2ff"/>
    <path d="M714 349 Q720 354 726 349" fill="none" stroke="#00d2ff" stroke-width="1"/>
    <line x1="720" y1="333" x2="720" y2="327" stroke="#00d2ff" stroke-width="1"/>
    <circle cx="720" cy="325" r="2" fill="#00d2ff"/>
    <text x="760" y="343" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#67e8f9" text-anchor="middle" font-weight="500">Reachy Mini</text>
    <text x="760" y="360" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b8ba7" text-anchor="middle">Robot Buddy</text>
  </g>

  <!-- SQLite -->
  <g filter="url(#shadow)">
    <rect x="310" y="420" width="140" height="60" rx="10" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="380" y="448" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle" font-weight="500">SQLite</text>
    <text x="380" y="465" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b8ba7" text-anchor="middle">Activity Logs</text>
  </g>

  <!-- Arrows: Camera -> Server -->
  <line x1="190" y1="120" x2="305" y2="150" stroke="#7b2ff7" stroke-width="1.5" opacity="0.6" marker-end="url(#arrowPurple)"/>
  <!-- Arrows: Mic -> Server -->
  <line x1="190" y1="230" x2="305" y2="210" stroke="#00d2ff" stroke-width="1.5" opacity="0.6"/>
  <!-- Arrows: Server -> OpenAI -->
  <line x1="420" y1="265" x2="420" y2="305" stroke="#fb923c" stroke-width="1.5" opacity="0.6" stroke-dasharray="5,3"/>
  <!-- Arrows: Server -> Dashboard -->
  <line x1="535" y1="140" x2="645" y2="130" stroke="#f472b6" stroke-width="1.5" opacity="0.6"/>
  <!-- Arrows: Server -> DNS -->
  <line x1="535" y1="210" x2="645" y2="230" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
  <!-- Arrows: Server -> Robot -->
  <line x1="535" y1="250" x2="645" y2="340" stroke="#00d2ff" stroke-width="1.5" opacity="0.6"/>
  <!-- Arrows: Server -> SQLite -->
  <line x1="400" y1="265" x2="385" y2="415" stroke="#a78bfa" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>

  <!-- Arrow labels -->
  <text x="240" y="125" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#7c7c9a" text-anchor="middle" transform="rotate(-8, 240, 125)">frames</text>
  <text x="240" y="218" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#7c7c9a" text-anchor="middle" transform="rotate(5, 240, 218)">audio</text>
  <text x="445" y="288" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#7c7c9a">API calls</text>
  <text x="590" y="125" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#7c7c9a" text-anchor="middle">WebSocket</text>
  <text x="598" y="225" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#7c7c9a" text-anchor="middle">block/allow</text>
  <text x="605" y="300" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#7c7c9a" text-anchor="middle">gestures</text>
</svg>
