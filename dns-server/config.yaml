server:
  listen_address: "0.0.0.0"
  port: 53

upstream:
  dns_server: "8.8.8.8"
  port: 53
  timeout: 3

blocking:
  mode: "zero_ip"  # Options: "zero_ip" or "nxdomain"

openclaw:
  enabled: true
  log_file: "logs/openclaw.log"

lists:
  blacklist: "lists/blacklist.txt"
  whitelist: "lists/whitelist.txt"