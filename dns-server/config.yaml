server:
  listen_address: "0.0.0.0"
  port: 53

upstream:
  dns_server: "1.1.1.1"
  port: 53
  timeout: 3

blocking:
  mode: "zero_ip"  # Options: "zero_ip" or "nxdomain"

lists:
  blacklist: "lists/blacklist.txt"
  whitelist: "lists/whitelist.txt"

dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 8080
  db_path: "data/dashboard.db"
